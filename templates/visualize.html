{% extends "base.html" %}
{% block title %}数据洞察 - 光影推荐{% endblock %}
{% block content %}
<style>
    .viz-card {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 20px;
        overflow: hidden;
        transition: box-shadow 0.3s;
    }

    .viz-card:hover {
        box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        border-color: rgba(255,255,255,0.12);
    }

    .viz-card-header {
        padding: 18px 24px;
        border-bottom: 1px solid rgba(255,255,255,0.07);
        background: rgba(0,0,0,0.2);
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .viz-card-header h5 {
        margin: 0;
        font-size: 1rem;
        font-weight: 600;
        color: #fff;
    }

    .viz-card-header .viz-icon {
        width: 32px; height: 32px;
        border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
        font-size: 0.85rem;
    }

    .viz-card-body {
        padding: 8px 16px 16px;
    }

    .page-header {
        margin-bottom: 36px;
    }

    .page-header h2 {
        font-size: 2.2rem;
        font-weight: 800;
        color: #fff;
    }

    .stat-strip {
        display: flex;
        gap: 16px;
        margin-bottom: 28px;
        flex-wrap: wrap;
    }

    .stat-item {
        flex: 1;
        min-width: 120px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 14px;
        padding: 18px 20px;
        text-align: center;
    }

    .stat-item .stat-val {
        font-size: 1.8rem;
        font-weight: 800;
        color: var(--accent-color);
        line-height: 1;
    }

    .stat-item .stat-label {
        font-size: 0.78rem;
        color: rgba(255,255,255,0.45);
        margin-top: 6px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
</style>

<div class="page-header text-center mt-4">
    <h2><i class="fas fa-chart-line me-3" style="color: var(--accent-color);"></i>电影数据洞察</h2>
    <p class="text-muted lead">多维度分析，透视影视市场的流派演变与时代脉络</p>
</div>

<div class="stat-strip">
    <div class="stat-item">
        <div class="stat-val" id="statTotalMovies">—</div>
        <div class="stat-label">收录影片</div>
    </div>
    <div class="stat-item">
        <div class="stat-val" id="statGenreCount">—</div>
        <div class="stat-label">电影流派</div>
    </div>
    <div class="stat-item">
        <div class="stat-val" id="statYearSpan">—</div>
        <div class="stat-label">年份跨度</div>
    </div>
    <div class="stat-item">
        <div class="stat-val" style="color: #4ecdc4;">9.0+</div>
        <div class="stat-label">神作佳片</div>
    </div>
</div>

<div class="row g-4 mb-4">
    <!-- 折线图：年度趋势 -->
    <div class="col-md-8">
        <div class="viz-card">
            <div class="viz-card-header">
                <div class="viz-icon" style="background: rgba(13,110,253,0.2); color: #5ba4fb;"><i class="fas fa-chart-line"></i></div>
                <h5>年度电影发布趋势</h5>
            </div>
            <div class="viz-card-body">
                <div id="yearChart" style="width: 100%; height: 380px;"></div>
            </div>
        </div>
    </div>

    <!-- 饼图：流派分布 -->
    <div class="col-md-4">
        <div class="viz-card">
            <div class="viz-card-header">
                <div class="viz-icon" style="background: rgba(25,200,100,0.2); color: #4ecdc4;"><i class="fas fa-chart-pie"></i></div>
                <h5>电影流派分布</h5>
            </div>
            <div class="viz-card-body">
                <div id="genreChart" style="width: 100%; height: 380px;"></div>
            </div>
        </div>
    </div>
</div>

<div class="row g-4 mb-5">
    <!-- 柱状图：评分分布 -->
    <div class="col-12">
        <div class="viz-card">
            <div class="viz-card-header">
                <div class="viz-icon" style="background: rgba(255,159,67,0.2); color: var(--accent-color);"><i class="fas fa-chart-bar"></i></div>
                <h5>评分分布情况</h5>
            </div>
            <div class="viz-card-body">
                <div id="ratingChart" style="width: 100%; height: 320px;"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const DARK_THEME = {
    backgroundColor: 'transparent',
    textStyle: { color: 'rgba(255,255,255,0.65)', fontFamily: 'Inter, sans-serif' },
    title: { textStyle: { color: '#fff' } },
    legend: { textStyle: { color: 'rgba(255,255,255,0.65)' } },
    tooltip: {
        backgroundColor: 'rgba(20,18,50,0.95)',
        borderColor: 'rgba(255,255,255,0.1)',
        textStyle: { color: '#fff' }
    },
    axisLine: { lineStyle: { color: 'rgba(255,255,255,0.12)' } },
    splitLine: { lineStyle: { color: 'rgba(255,255,255,0.06)' } },
    axisLabel: { color: 'rgba(255,255,255,0.5)' }
};

document.addEventListener("DOMContentLoaded", function () {
    fetch('/api/chart-data')
        .then(res => res.json())
        .then(data => {
            // 统计数字
            const totalMovies = data.year_counts ? data.year_counts.reduce((a,b)=>a+b,0) : 0;
            document.getElementById('statTotalMovies').textContent = totalMovies.toLocaleString();
            document.getElementById('statGenreCount').textContent = data.genres ? data.genres.length : '—';
            if (data.years && data.years.length) {
                const span = data.years[data.years.length-1] - data.years[0];
                document.getElementById('statYearSpan').textContent = span + '年';
            }

            initYearChart(data.years, data.year_counts);
            initGenreChart(data.genres);
            initRatingChart();
        });

    function initYearChart(years, counts) {
        var chart = echarts.init(document.getElementById('yearChart'));
        chart.setOption({
            ...DARK_THEME,
            tooltip: { ...DARK_THEME.tooltip, trigger: 'axis' },
            grid: { left: '3%', right: '4%', bottom: '4%', containLabel: true },
            xAxis: {
                type: 'category', data: years,
                axisLine: DARK_THEME.axisLine,
                axisLabel: { ...DARK_THEME.axisLabel, rotate: 30 },
                splitLine: { show: false }
            },
            yAxis: {
                type: 'value', name: '电影数量',
                nameTextStyle: { color: 'rgba(255,255,255,0.4)' },
                axisLine: DARK_THEME.axisLine,
                axisLabel: DARK_THEME.axisLabel,
                splitLine: DARK_THEME.splitLine
            },
            series: [{
                data: counts,
                type: 'line',
                smooth: true,
                symbolSize: 6,
                areaStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: 'rgba(91,164,251,0.35)' },
                        { offset: 1, color: 'rgba(91,164,251,0.02)' }
                    ])
                },
                lineStyle: { color: '#5ba4fb', width: 2.5 },
                itemStyle: { color: '#5ba4fb', borderWidth: 2, borderColor: '#1a1a2e' }
            }]
        });
        window.addEventListener('resize', () => chart.resize());
    }

    function initGenreChart(genres) {
        var chart = echarts.init(document.getElementById('genreChart'));
        chart.setOption({
            ...DARK_THEME,
            tooltip: { ...DARK_THEME.tooltip, trigger: 'item', formatter: '{b}: {c} ({d}%)' },
            legend: {
                ...DARK_THEME.legend,
                orient: 'vertical', left: 'left', top: 'center',
                icon: 'circle', itemWidth: 8, itemHeight: 8
            },
            series: [{
                name: '流派',
                type: 'pie',
                radius: ['42%', '68%'],
                center: ['65%', '50%'],
                avoidLabelOverlap: true,
                itemStyle: { borderRadius: 6, borderColor: 'rgba(20,18,50,0.8)', borderWidth: 2 },
                label: { show: false },
                emphasis: {
                    label: { show: true, fontSize: 16, fontWeight: 'bold', color: '#fff' },
                    itemStyle: { shadowBlur: 12, shadowColor: 'rgba(0,0,0,0.5)' }
                },
                data: genres
            }]
        });
        window.addEventListener('resize', () => chart.resize());
    }

    function initRatingChart() {
        var chart = echarts.init(document.getElementById('ratingChart'));
        chart.setOption({
            ...DARK_THEME,
            tooltip: { ...DARK_THEME.tooltip, trigger: 'axis', axisPointer: { type: 'shadow' } },
            grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
            xAxis: {
                type: 'category',
                data: ['< 6.0', '6.0 – 7.0', '7.0 – 8.0', '8.0 – 9.0', '≥ 9.0'],
                axisLine: DARK_THEME.axisLine,
                axisLabel: DARK_THEME.axisLabel,
                splitLine: { show: false }
            },
            yAxis: {
                type: 'value', name: '数量',
                nameTextStyle: { color: 'rgba(255,255,255,0.4)' },
                axisLine: DARK_THEME.axisLine,
                axisLabel: DARK_THEME.axisLabel,
                splitLine: DARK_THEME.splitLine
            },
            series: [{
                name: '电影数量',
                type: 'bar',
                barWidth: '45%',
                data: [5, 12, 35, 20, 8],
                itemStyle: {
                    borderRadius: [6, 6, 0, 0],
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: '#ff9f43' },
                        { offset: 1, color: '#ff6b6b' }
                    ])
                },
                emphasis: {
                    itemStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: '#ffb167' },
                            { offset: 1, color: '#ff8585' }
                        ])
                    }
                }
            }]
        });
        window.addEventListener('resize', () => chart.resize());
    }
});
</script>
{% endblock %}
