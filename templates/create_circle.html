{% extends 'base.html' %}

{% block title %}创建圈子 - 光影推荐{% endblock %}

{% block head %}
<style>
    .color-option:hover {
        transform: scale(1.1);
    }
    .color-option.selected {
        border-color: #007bff;
        box-shadow: 0 0 0 3px rgba(0,123,255,0.3);
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header" style="background-color: transparent; border-bottom: none;">
                    <h2 class="card-title" style="background: linear-gradient(90deg, #ff9f43, #ff6b35); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold;">创建新圈子</h2>
                </div>
                <div class="card-body">
                    <form action="{{ url_for('create_circle') }}" method="POST" enctype="multipart/form-data">
                        <div class="mb-4">
                            <label for="name" class="form-label">圈子名称</label>
                            <input type="text" id="name" name="name" class="form-control" placeholder="请输入圈子名称" required>
                        </div>
                        <div class="mb-4">
                            <label for="description" class="form-label">圈子描述</label>
                            <textarea id="description" name="description" class="form-control" rows="4" placeholder="请描述圈子的主题和目的" required></textarea>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">圈子背景</label>
                            <p class="text-muted text-sm mb-3">请选择背景颜色或背景图片，二选一</p>
                            <!-- 颜色选择区域 -->
                            <div id="color-section" class="mb-4">
                                <div style="padding: 15px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; background-color: #9c27b0; cursor: pointer;" onclick="document.getElementById('background_color').click();">
                                    <span style="color: white; font-weight: 500;">点击选择颜色</span>
                                    <div style="width: 32px; height: 32px; border-radius: 4px; background-color: #9c27b0; border: 2px solid rgba(255, 255, 255, 0.3);"></div>
                                    <input type="color" id="background_color" name="background_color" value="#9c27b0" style="display: none;">
                                </div>
                            </div>
                            <script>
                                // 设置颜色选择器和预览区域的初始值
                                document.addEventListener('DOMContentLoaded', function() {
                                    const colorInput = document.getElementById('background_color');
                                    const colorPreview = document.querySelector('#color-section div');
                                    const colorSquare = colorPreview.querySelector('div');
                                    if (colorInput && colorPreview && colorSquare) {
                                        // 监听颜色变化
                                        colorInput.addEventListener('input', function() {
                                            colorPreview.style.backgroundColor = this.value;
                                            colorSquare.style.backgroundColor = this.value;
                                        });
                                    }
                                });
                            </script>
                        </div>
                        <div class="mb-4">
                            <label for="background_image" class="form-label">上传背景图片</label>
                            <input type="file" id="background_image" name="background_image" class="form-control" accept="image/*">
                            <small class="text-muted">支持 JPG、PNG、GIF 格式，建议尺寸 1200x400</small>
                        </div>
                        <div class="d-flex justify-content-end">
                            <a href="{{ url_for('circles') }}" class="btn btn-outline-light me-3">取消</a>
                            <button type="submit" class="btn btn-primary">创建圈子</button>
                        </div>
                        <script>
                            document.addEventListener('DOMContentLoaded', function() {
                                const colorOptions = document.querySelectorAll('.color-option');
                                const colorInput = document.getElementById('background_color');
                                
                                colorOptions.forEach(option => {
                                    option.addEventListener('click', function() {
                                        const color = this.getAttribute('data-color');
                                        colorInput.value = color;
                                        
                                        // 移除所有选中状态
                                        colorOptions.forEach(opt => opt.classList.remove('selected'));
                                        // 添加当前选中状态
                                        this.classList.add('selected');
                                    });
                                });
                                
                                colorInput.addEventListener('change', function() {
                                    const color = this.value;
                                    // 移除所有选中状态
                                    colorOptions.forEach(opt => opt.classList.remove('selected'));
                                    // 找到对应的颜色选项并选中
                                    colorOptions.forEach(opt => {
                                        if (opt.getAttribute('data-color') === color) {
                                            opt.classList.add('selected');
                                        }
                                    });
                                });
                            });
                        </script>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
