<!DOCTYPE html>
{% extends "base.html" %}
{% block title %}注册 - 光影推荐{% endblock %}
{% block content %}
<style>
    .auth-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .auth-card {
        width: 100%;
        max-width: 440px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        padding: 48px 44px;
        backdrop-filter: blur(20px);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
        position: relative;
        overflow: hidden;
    }

    .auth-card::before {
        content: '';
        position: absolute;
        bottom: -60px; right: -60px;
        width: 200px; height: 200px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255,107,107,0.1), transparent 70%);
        pointer-events: none;
    }

    .auth-logo {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-bottom: 8px;
    }

    .auth-logo-icon {
        width: 52px; height: 52px;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--accent-color), #ff6b6b);
        display: flex; align-items: center; justify-content: center;
        font-size: 22px;
        color: #000;
        box-shadow: 0 8px 20px rgba(255,159,67,0.4);
    }

    .auth-logo-text {
        font-size: 1.6rem;
        font-weight: 800;
        color: var(--accent-color);
        letter-spacing: 1px;
    }

    .auth-title {
        text-align: center;
        font-size: 1.05rem;
        color: rgba(255,255,255,0.5);
        margin-bottom: 36px;
        font-weight: 400;
    }

    .auth-input-group {
        margin-bottom: 20px;
    }

    .auth-input-group label {
        display: block;
        font-size: 0.82rem;
        font-weight: 600;
        color: rgba(255,255,255,0.6);
        letter-spacing: 0.5px;
        text-transform: uppercase;
        margin-bottom: 8px;
    }

    .auth-input-wrap {
        position: relative;
    }

    .auth-input-wrap i {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: rgba(255,255,255,0.35);
        font-size: 0.95rem;
        pointer-events: none;
        transition: color 0.2s;
    }

    .auth-input {
        width: 100%;
        background: rgba(255,255,255,0.06) !important;
        border: 1px solid rgba(255,255,255,0.1) !important;
        border-radius: 12px !important;
        color: #fff !important;
        padding: 13px 16px 13px 44px;
        font-size: 0.95rem;
        transition: all 0.25s;
    }

    .auth-input:focus {
        background: rgba(255,255,255,0.09) !important;
        border-color: rgba(255,159,67,0.55) !important;
        box-shadow: 0 0 0 3px rgba(255,159,67,0.12) !important;
        outline: none;
    }

    .auth-input-wrap:focus-within i {
        color: var(--accent-color);
    }

    .auth-input::placeholder {
        color: rgba(255,255,255,0.25) !important;
    }

    .auth-hint {
        font-size: 0.78rem;
        color: rgba(255,255,255,0.3);
        margin-top: 6px;
    }

    .auth-submit {
        width: 100%;
        padding: 13px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--accent-color), #ff6b6b);
        color: #000;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 8px;
        letter-spacing: 0.3px;
    }

    .auth-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(255,159,67,0.4);
        filter: brightness(1.08);
    }

    .auth-benefits {
        display: flex;
        gap: 16px;
        justify-content: center;
        margin-bottom: 28px;
    }

    .auth-benefit-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.78rem;
        color: rgba(255,255,255,0.4);
    }

    .auth-benefit-item i {
        color: var(--accent-color);
        font-size: 0.75rem;
    }

    .auth-divider {
        display: flex;
        align-items: center;
        gap: 14px;
        margin: 24px 0;
    }

    .auth-divider::before,
    .auth-divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: rgba(255,255,255,0.08);
    }

    .auth-divider span {
        font-size: 0.8rem;
        color: rgba(255,255,255,0.3);
    }

    .auth-footer {
        text-align: center;
        font-size: 0.9rem;
        color: rgba(255,255,255,0.4);
    }

    .auth-footer a {
        color: var(--accent-color) !important;
        font-weight: 600;
        text-decoration: none;
    }

    .auth-footer a:hover {
        color: #ffb167 !important;
        text-decoration: underline;
    }
</style>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="auth-logo-icon"><i class="fas fa-film"></i></div>
            <span class="auth-logo-text">光影推荐</span>
        </div>
        <p class="auth-title">创建账号，开启专属观影宇宙</p>

        <div class="auth-benefits">
            <div class="auth-benefit-item"><i class="fas fa-check-circle"></i>免费使用</div>
            <div class="auth-benefit-item"><i class="fas fa-check-circle"></i>AI 推荐</div>
            <div class="auth-benefit-item"><i class="fas fa-check-circle"></i>收藏追踪</div>
        </div>

        <form method="POST" id="registerForm">
            <div class="auth-input-group">
                <label>用户名</label>
                <div class="auth-input-wrap">
                    <input type="text" name="username" class="auth-input" required placeholder="设置你的专属用户名">
                    <i class="fas fa-user"></i>
                </div>
            </div>
            <div class="auth-input-group">
                <label>密码</label>
                <div class="auth-input-wrap">
                    <input type="password" name="password" class="auth-input" required placeholder="至少 6 位，建议包含字母和数字">
                    <i class="fas fa-lock"></i>
                </div>
                <p class="auth-hint"><i class="fas fa-shield-alt me-1"></i>密码经过安全加密存储，请放心</p>
            </div>
            
            <!-- 人脸注册选项 -->
            <div class="auth-input-group">
                <label>人脸登录</label>
                <div class="auth-face-option">
                    <button type="button" class="face-auth-btn" onclick="openFaceRegisterModal()">
                        <i class="fas fa-fingerprint me-2"></i>注册人脸登录
                    </button>
                    <p class="auth-hint"><i class="fas fa-info-circle me-1"></i>注册后可使用人脸识别快速登录</p>
                </div>
            </div>
            
            <input type="hidden" name="face_encoding" id="faceEncodingInput">
            
            <button type="submit" class="auth-submit">
                <i class="fas fa-user-plus me-2"></i>免费注册
            </button>
        </form>

        <div class="auth-divider"><span>已有账号</span></div>

        <div class="auth-footer">
            <a href="{{ url_for('login') }}"><i class="fas fa-sign-in-alt me-1"></i>直接登录</a>
        </div>
    </div>
</div>

<!-- 人脸注册模态框 -->
<div id="face-register-modal" class="face-modal">
    <div class="face-modal-content">
        <div class="face-modal-header">
            <h3>注册人脸登录</h3>
            <button class="close-btn" onclick="closeFaceRegisterModal()">&times;</button>
        </div>
        <div class="face-modal-body">
            <div class="face-camera-container">
                <div id="face-register-placeholder" class="face-placeholder">
                    <i class="fas fa-camera fa-4x"></i>
                    <p>点击下方按钮开始</p>
                </div>
                <video id="face-register-video" class="face-video" autoplay playsinline></video>
                <canvas id="face-register-canvas" class="face-canvas"></canvas>
                <div id="face-register-scan-line" class="face-scan-line"></div>
            </div>
            <div id="face-register-status" class="face-status">
                <p>请点击下方按钮开始摄像头</p>
            </div>
            <div class="face-modal-buttons">
                <button id="face-register-start-btn" class="face-btn start-btn" onclick="startFaceRegisterCamera()">
                    <i class="fas fa-video me-2"></i>开启摄像头
                </button>
                <button id="face-register-capture-btn" class="face-btn capture-btn" onclick="captureAndRegisterFace()" disabled>
                    <i class="fas fa-camera me-2"></i>捕获人脸
                </button>
            </div>
        </div>
    </div>
</div>

<script>
// ========== 人脸注册相关函数 ==========

let faceRegisterStream = null;
let faceRegisterVideo = document.getElementById('face-register-video');
let faceRegisterCanvas = document.getElementById('face-register-canvas');
let faceRegisterPlaceholder = document.getElementById('face-register-placeholder');
let faceRegisterScanLine = document.getElementById('face-register-scan-line');
let faceRegisterStartBtn = document.getElementById('face-register-start-btn');
let faceRegisterCaptureBtn = document.getElementById('face-register-capture-btn');
let faceRegisterStatus = document.getElementById('face-register-status');
let faceRegisterModal = document.getElementById('face-register-modal');
let faceEncodingInput = document.getElementById('faceEncodingInput');

// 打开人脸注册模态框
function openFaceRegisterModal() {
    faceRegisterModal.style.display = 'flex';
    resetFaceRegisterModal();
}

// 关闭人脸注册模态框
function closeFaceRegisterModal() {
    faceRegisterModal.style.display = 'none';
    stopFaceRegisterCamera();
}

// 重置模态框状态
function resetFaceRegisterModal() {
    stopFaceRegisterCamera();
    faceRegisterPlaceholder.style.display = 'flex';
    faceRegisterVideo.style.display = 'none';
    faceRegisterScanLine.style.opacity = '0';
    faceRegisterStartBtn.style.display = 'inline-block';
    faceRegisterCaptureBtn.style.display = 'none';
    faceRegisterStartBtn.disabled = false;
    faceRegisterCaptureBtn.disabled = false;
    setFaceRegisterStatus('请点击下方按钮开始摄像头', 'info');
}

// 设置状态信息
function setFaceRegisterStatus(message, type = 'info') {
    faceRegisterStatus.innerHTML = `<p class="face-status-${type}">${message}</p>`;
}

// 启动摄像头
async function startFaceRegisterCamera() {
    try {
        faceRegisterStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
        faceRegisterVideo.srcObject = faceRegisterStream;
        
        faceRegisterPlaceholder.style.display = 'none';
        faceRegisterVideo.style.display = 'block';
        faceRegisterStartBtn.style.display = 'none';
        faceRegisterCaptureBtn.style.display = 'inline-block';
        
        setFaceRegisterStatus('摄像头已开启，请将面部对正圆形区域后点击捕获', 'info');
        
        // 添加扫描线动画
        faceRegisterScanLine.style.opacity = '1';
    } catch (err) {
        console.error('摄像头启动失败:', err);
        setFaceRegisterStatus('无法访问摄像头，请检查权限设置', 'error');
        faceRegisterStartBtn.disabled = false;
    }
}

// 停止摄像头
function stopFaceRegisterCamera() {
    if (faceRegisterStream) {
        faceRegisterStream.getTracks().forEach(track => track.stop());
        faceRegisterStream = null;
    }
}

// 捕获人脸并注册
async function captureAndRegisterFace() {
    if (!faceRegisterStream) {
        setFaceRegisterStatus('请先开启摄像头', 'error');
        return;
    }
    
    faceRegisterCaptureBtn.disabled = true;
    setFaceRegisterStatus('正在识别面部...', 'info');
    
    try {
        // 绘制视频帧到画布
        let ctx = faceRegisterCanvas.getContext('2d');
        faceRegisterCanvas.width = faceRegisterVideo.videoWidth;
        faceRegisterCanvas.height = faceRegisterVideo.videoHeight;
        ctx.drawImage(faceRegisterVideo, 0, 0, faceRegisterCanvas.width, faceRegisterCanvas.height);
        
        // 转换为 base64
        let imageData = faceRegisterCanvas.toDataURL('image/jpeg', 0.9);
        
        // 发送到服务器进行人脸特征提取
        let response = await fetch('/api/face/register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ image: imageData })
        });
        
        let result = await response.json();
        
        if (result.success) {
            // 存储人脸特征到隐藏输入框
            faceEncodingInput.value = result.encoding;
            setFaceRegisterStatus('人脸注册成功！', 'success');
            
            // 3秒后关闭模态框
            setTimeout(() => {
                closeFaceRegisterModal();
            }, 1500);
        } else {
            setFaceRegisterStatus(result.message, 'error');
            faceRegisterCaptureBtn.disabled = false;
        }
    } catch (err) {
        console.error('人脸注册失败:', err);
        setFaceRegisterStatus('人脸识别失败，请重试', 'error');
        faceRegisterCaptureBtn.disabled = false;
    }
}

// 页面关闭时停止摄像头
window.addEventListener('beforeunload', stopFaceRegisterCamera);
</script>

<style>
/* 人脸注册模态框样式 */
.face-modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.8);
    z-index: 1000;
    align-items: center;
    justify-content: center;
}

.face-modal-content {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    width: 90%;
    max-width: 500px;
    backdrop-filter: blur(20px);
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
    overflow: hidden;
}

.face-modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 24px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
}

.face-modal-header h3 {
    color: #fff;
    font-size: 1.2rem;
    font-weight: 600;
    margin: 0;
}

.close-btn {
    background: none;
    border: none;
    color: rgba(255, 255, 255, 0.5);
    font-size: 1.5rem;
    cursor: pointer;
    padding: 0;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: all 0.2s;
}

.close-btn:hover {
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
}

.face-modal-body {
    padding: 24px;
}

.face-camera-container {
    position: relative;
    width: 100%;
    padding-top: 100%; /* 1:1 Aspect Ratio */
    margin-bottom: 20px;
    border-radius: 12px;
    overflow: hidden;
    background: rgba(0, 0, 0, 0.3);
}

.face-placeholder {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: rgba(255, 255, 255, 0.4);
}

.face-placeholder i {
    margin-bottom: 12px;
}

.face-video {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
}

.face-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
}

.face-scan-line {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-color), transparent);
    opacity: 0;
    animation: scan 2s linear infinite;
}

@keyframes scan {
    0% { top: 0; opacity: 0; }
    50% { opacity: 1; }
    100% { top: 100%; opacity: 0; }
}

.face-status {
    text-align: center;
    margin-bottom: 20px;
    min-height: 40px;
}

.face-status-info {
    color: rgba(255, 255, 255, 0.7);
}

.face-status-success {
    color: #4CAF50;
}

.face-status-error {
    color: #f44336;
}

.face-modal-buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
}

.face-btn {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
}

.start-btn {
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
}

.start-btn:hover {
    background: rgba(255, 255, 255, 0.15);
}

.capture-btn {
    background: linear-gradient(135deg, var(--accent-color), #ff6b6b);
    color: #000;
}

.capture-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(255, 159, 67, 0.4);
}

.face-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

/* 人脸认证按钮样式 */
.face-auth-btn {
    width: 100%;
    padding: 12px;
    border: 1px solid rgba(255, 159, 67, 0.4);
    border-radius: 12px;
    background: rgba(255, 159, 67, 0.1);
    color: var(--accent-color);
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 8px;
}

.face-auth-btn:hover {
    background: rgba(255, 159, 67, 0.15);
    border-color: var(--accent-color);
    transform: translateY(-1px);
}
</style>

{% endblock %}
